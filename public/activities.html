<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>활동 이력 | MISO CRM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <main class="main">
    <div class="content">
      <div class="card">
        <div class="card-header">
          <h2>활동 이력 (전체)</h2>
        </div>
        <div class="card-body">
          <div class="filter-bar">
            <select id="f_cat"><option value="">전체 분야</option><option>영업방문</option><option>전화상담</option><option>이슈등록</option><option>리스트등록</option></select>
            <input type="text" id="f_kw" placeholder="제목/내용 검색">
            <button class="btn" id="searchBtn">조회</button>
            <button class="btn btn-outline" id="resetBtn">초기화</button>
          </div>
          <div class="table-wrap"><table class="data">
            <thead><tr><th>일자</th><th>분야</th><th>프로젝트</th><th class="num">활동 후 수주확률(%)</th><th>제목</th><th>내용</th><th>작성자</th></tr></thead>
            <tbody id="actTbody"></tbody>
          </table></div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="js/common.js"></script>
<script>
renderLayout('활동 이력');
async function load() {
  const params = new URLSearchParams();
  const cat = document.getElementById('f_cat').value;
  const kw = document.getElementById('f_kw').value;
  if (cat) params.set('category', cat);
  if (kw) params.set('keyword', kw);
  const rows = await api.get('/api/activities?' + params);
  document.getElementById('actTbody').innerHTML = rows.map(r => `
    <tr>
      <td>${r.activity_date||''}</td>
      <td><span class="badge badge-기획단계">${r.category||''}</span></td>
      <td><span class="proj-link" data-pid="${r.project_id}" style="color:#2563eb;cursor:pointer;text-decoration:underline;">${r.project_name||''}</span></td>
      <td class="num">${r.post_win_rate||0}</td>
      <td>${r.title||''}</td>
      <td style="white-space:pre-wrap;max-width:400px;">${(r.content||'').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</td>
      <td>${r.creator_name||''}</td>
    </tr>`).join('') || `<tr><td colspan="7" class="empty">활동이 없습니다.</td></tr>`;
  document.querySelectorAll('.proj-link').forEach(el => {
    el.onclick = () => {
      const pid = el.dataset.pid;
      if (pid) openDetailPopup(pid, () => load());
    };
  });
}
document.getElementById('searchBtn').onclick = load;
document.getElementById('resetBtn').onclick = () => { document.getElementById('f_cat').value=''; document.getElementById('f_kw').value=''; load(); };
document.getElementById('f_kw').addEventListener('keydown', e => { if (e.key==='Enter') load(); });
load();
</script>
</body>
</html>
