<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>로그인 | MISO CRM</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 50%, #60a5fa 100%);
      background-attachment: fixed;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", Roboto, sans-serif;
    }
    .landing {
      width: 100%; max-width: 980px;
      display: grid; grid-template-columns: 1.2fr 1fr; gap: 0;
      background: #fff; border-radius: 16px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .hero {
      background: linear-gradient(135deg, #1e40af, #2563eb);
      color: #fff; padding: 48px 40px;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .hero h1 { font-size: 32px; margin: 0 0 6px; font-weight: 700; letter-spacing: -0.5px; }
    .hero h2 { font-size: 14px; font-weight: 400; opacity: 0.85; margin: 0 0 32px; }
    .hero .features { display: flex; flex-direction: column; gap: 12px; font-size: 13px; opacity: 0.95; }
    .hero .features div { display: flex; align-items: center; gap: 8px; }
    .hero .features span.dot { width: 6px; height: 6px; background: #93c5fd; border-radius: 50%; }
    .hero .footer { font-size: 11px; opacity: 0.6; margin-top: 28px; }

    .login-box { padding: 48px 40px; display: flex; flex-direction: column; justify-content: center; }
    .login-box h3 { margin: 0 0 6px; font-size: 22px; color: #0f172a; font-weight: 700; }
    .login-box .sub { color: #64748b; font-size: 13px; margin-bottom: 24px; }
    .login-form .row { margin-bottom: 14px; }
    .login-form label { display: block; font-size: 12px; color: #475569; margin-bottom: 6px; font-weight: 500; }
    .login-form input {
      width: 100%; padding: 11px 13px; font-size: 14px;
      border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box;
      transition: border-color .15s, box-shadow .15s;
    }
    .login-form input:focus {
      outline: none; border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }
    .login-form button {
      width: 100%; padding: 12px; margin-top: 10px;
      background: #2563eb; color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .login-form button:hover { background: #1d4ed8; }
    .login-form button:disabled { background: #94a3b8; cursor: not-allowed; }
    .error-msg {
      color: #dc2626; font-size: 12px; min-height: 18px;
      margin: 6px 0; padding: 0 2px;
    }
    .hint {
      margin-top: 18px; padding-top: 14px; border-top: 1px solid #f1f5f9;
      font-size: 11px; color: #94a3b8; text-align: center; line-height: 1.5;
    }
    @media (max-width: 720px) {
      .landing { grid-template-columns: 1fr; }
      .hero { padding: 36px 28px 24px; }
      .login-box { padding: 28px; }
      body { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="hero">
      <div>
        <h1>MISO CRM</h1>
        <h2>프로젝트 / 영업 / 손익 통합 관리</h2>
        <div class="features">
          <div><span class="dot"></span> 프로젝트 단계별 영업현황 관리</div>
          <div><span class="dot"></span> 매출 · 매입 · 투입공수 통합 손익</div>
          <div><span class="dot"></span> 본부별 영업목표 · 월별 판관비 / 공통비</div>
          <div><span class="dot"></span> 경영 대시보드 + 일정 캘린더</div>
          <div><span class="dot"></span> 사업자조회 / 진위확인 (국세청 OpenAPI)</div>
        </div>
      </div>
      <div class="footer">© 미소정보기술 · MISO CRM</div>
    </div>

    <div class="login-box">
      <h3>로그인</h3>
      <div class="sub">계정 정보로 로그인해주세요.</div>
      <form class="login-form" id="loginForm">
        <div class="row">
          <label for="username">아이디</label>
          <input id="username" name="username" autocomplete="username" autofocus required>
        </div>
        <div class="row">
          <label for="password">비밀번호</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button type="submit" id="submitBtn">로그인</button>
      </form>
      <div class="hint">
        최초 관리자: <code style="background:#f1f5f9;padding:1px 5px;border-radius:3px;">admin / Admin@2026</code><br>
        로그인 후 사용자 관리에서 비밀번호 변경을 권장합니다.
      </div>
    </div>
  </div>

  <script>
  (function() {
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    // 이미 로그인 상태면 바로 이동
    fetch('/api/auth/me').then(r => {
      if (r.ok) goNext();
    }).catch(() => {});

    function goNext() {
      const url = new URL(location.href);
      const next = url.searchParams.get('next');
      location.href = next || '/';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.textContent = '';
      submitBtn.disabled = true; submitBtn.textContent = '로그인 중...';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        if (!r.ok) {
          const e = await r.json().catch(() => ({}));
          errorMsg.textContent = e.error || '로그인 실패';
          return;
        }
        goNext();
      } catch (err) {
        errorMsg.textContent = '서버 오류: ' + err.message;
      } finally {
        submitBtn.disabled = false; submitBtn.textContent = '로그인';
      }
    });
  })();
  </script>
</body>
</html>
