<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>과제 상세 | MISO CRM</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/richEditor.css">
</head>
<body>
<div class="app">
  <main class="main">
    <div class="content">
      <div class="card">
        <div class="card-body">
          <div class="flex-between mb-8">
            <div>
              <div class="text-muted" style="font-size:12px">과제번호</div>
              <div style="font-size:18px; font-weight:700;" id="resTitle">로딩 중...</div>
            </div>
            <div class="flex gap-8">
              <a class="btn btn-outline" href="research.html" id="listBtn">← 목록</a>
              <button class="btn btn-danger" id="deleteBtn">🗑 삭제</button>
              <button class="btn btn-primary" id="saveBtn">저장</button>
            </div>
          </div>
          <div class="status-flow" id="stageFlow"></div>
        </div>
      </div>

      <div class="tabs" id="detailTabs">
        <button class="tab active" data-tab="basic">기본정보</button>
        <button class="tab" data-tab="overview">과제 개요</button>
        <button class="tab" data-tab="members">참여연구원</button>
        <button class="tab" data-tab="costs">연구비 집행</button>
        <button class="tab" data-tab="funds">연구비 수급</button>
        <button class="tab" data-tab="summary">요약</button>
      </div>

      <div class="tab-panel active" id="tab-basic"></div>
      <div class="tab-panel" id="tab-overview"></div>
      <div class="tab-panel" id="tab-members"></div>
      <div class="tab-panel" id="tab-costs"></div>
      <div class="tab-panel" id="tab-funds"></div>
      <div class="tab-panel" id="tab-summary"></div>
    </div>
  </main>
</div>
<script src="js/common.js"></script>
<script src="js/components.js"></script>
<script src="js/richEditor.js"></script>
<script src="js/research-detail.js"></script>
</body>
</html>
